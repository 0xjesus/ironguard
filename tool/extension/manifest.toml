schema_version = "reborn.extension_manifest.v2"
id = "ironguard"
name = "IronGuard"
version = "0.1.0"
description = "Read-only repository security auditor: scans file content for exposed secrets and audits dependencies against OSV.dev. (spike build)"
trust = "untrusted"

[runtime]
kind = "wasm"
module = "wasm/ironguard_tool.wasm"

[[capabilities]]
id = "ironguard.scan"
description = "THE tool to audit a repository for security risks. Use it whenever the user asks to scan/audit/check a repo, its dependencies, or its security. It checks dependencies against the live OSV.dev database for known vulnerabilities and MALICIOUS packages, and scans provided file contents for exposed secrets. HOW TO CALL: read the repo's dependency manifest(s) (one short read each) and pass each in `manifests` as {path, kind, content}, where `kind` is EXACTLY one of: package.json, requirements.txt, cargo.toml. Optionally pass .env/config files in `files` as {path, content}. Call this tool directly with those contents in ONE call — do NOT read the whole repo or analyze the files yourself."
effects = ["network"]
default_permission = "ask"
visibility = "model"
input_schema_ref = "schemas/ironguard/scan.input.v1.json"
output_schema_ref = "schemas/ironguard/scan.output.v1.json"
prompt_doc_ref = "prompts/ironguard/scan.md"
required_host_ports = ["host.runtime.http_egress"]
